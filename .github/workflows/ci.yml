name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  python:
    name: Python — parse & smoke tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check (compileall)
        run: python -m compileall -q app/ run.py

      - name: Smoke tests
        run: python -m pytest tests/ -v
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production

  javascript:
    name: JavaScript — syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check JS files parse
        run: |
          shopt -s globstar nullglob
          failed=0
          for f in app/static/js/**/*.js; do
            if ! node --check "$f" 2>&1; then
              echo "::error file=$f::JS syntax error"
              failed=1
            fi
          done
          exit $failed

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # gitleaks-action requires a paid license for org-owned repos.
      # We install the upstream open-source binary directly — no license needed.
      - name: Install gitleaks
        run: |
          VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --no-banner --redact --verbose
