<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - WP Launcher</title>
    <script>
        (function() {
            try {
                var saved = localStorage.getItem('wp-launcher-theme');
                var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.dataset.theme = saved || (systemDark ? 'dark' : 'light');
            } catch (e) { document.documentElement.dataset.theme = 'dark'; }
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background: #030712;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(56, 189, 248, 0.08), transparent 70%),
                radial-gradient(ellipse 40% 50% at 100% 100%, rgba(129, 140, 248, 0.06), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.018'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        .login-container {
            background: rgba(13, 21, 37, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 2.75rem;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.08);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 60px rgba(56, 189, 248, 0.04);
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.3), transparent);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h2 {
            background: linear-gradient(135deg, #38bdf8 0%, #a78bfa 60%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .form-label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
            background: rgba(8, 13, 24, 0.6);
            color: #f0f6fc;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .form-control:focus {
            border-color: rgba(56, 189, 248, 0.35);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.08);
            background: rgba(8, 13, 24, 0.8);
            color: #f0f6fc;
        }
        .form-control::placeholder {
            color: #475569;
        }
        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            border: none;
            border-radius: 10px;
            padding: 0.7rem;
            font-weight: 600;
            width: 100%;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            color: white;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.25);
            transform: translateY(-1px);
        }
        .btn-github {
            background: rgba(255, 255, 255, 0.04);
            color: #f0f6fc;
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 10px;
            padding: 0.7rem;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-github:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(148, 163, 184, 0.2);
            color: white;
            transform: translateY(-1px);
        }
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(148, 163, 184, 0.08);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            background: transparent;
            padding: 0 1rem;
            color: #475569;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .alert {
            border-radius: 10px;
            background: rgba(248, 113, 113, 0.06);
            border: 1px solid rgba(248, 113, 113, 0.15);
            color: #f0f6fc;
        }

        /* ── Light theme overrides ── */
        [data-theme="light"] body {
            background: #f1f5f9;
        }
        [data-theme="light"] body::before {
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(6, 182, 212, 0.08), transparent 70%),
                radial-gradient(ellipse 40% 50% at 100% 100%, rgba(139, 92, 246, 0.05), transparent 60%);
        }
        [data-theme="light"] body::after {
            opacity: 0.35;
            filter: invert(1);
        }
        [data-theme="light"] .login-container {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(15, 23, 42, 0.08);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12), 0 0 60px rgba(6, 182, 212, 0.04);
        }
        [data-theme="light"] .login-container::before {
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.4), transparent);
        }
        [data-theme="light"] .login-header h2 {
            background: linear-gradient(135deg, #0891b2 0%, #0284c7 60%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        [data-theme="light"] .login-header p {
            color: #475569;
        }
        [data-theme="light"] .form-label {
            color: #475569;
        }
        [data-theme="light"] .form-control {
            background: #ffffff;
            border-color: rgba(15, 23, 42, 0.1);
            color: #0f172a;
        }
        [data-theme="light"] .form-control:focus {
            border-color: rgba(6, 182, 212, 0.45);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
            background: #ffffff;
        }
        [data-theme="light"] .form-control::placeholder {
            color: #94a3b8;
        }
        [data-theme="light"] .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        }
        [data-theme="light"] .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.35);
        }
        [data-theme="light"] .btn-github {
            background: #0f172a;
            color: #ffffff;
            border-color: #0f172a;
        }
        [data-theme="light"] .btn-github:hover {
            background: #1e293b;
            border-color: #1e293b;
            color: #ffffff;
        }
        [data-theme="light"] .divider::before,
        [data-theme="light"] .divider::after {
            background: rgba(15, 23, 42, 0.1);
        }
        [data-theme="light"] .divider span {
            color: #94a3b8;
        }
        [data-theme="light"] .alert {
            background: rgba(220, 38, 38, 0.06);
            border-color: rgba(220, 38, 38, 0.2);
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2><i class="fas fa-rocket me-2"></i>WP Launcher</h2>
            <p>Connectez-vous pour gérer vos projets</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Connexion classique -->
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label for="username" class="form-label">Nom d'utilisateur</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
            </button>
        </form>

        <div class="divider"><span>OU</span></div>

        <!-- Connexion GitHub -->
        <a href="{{ url_for('auth.login_github') }}" class="btn btn-github">
            <i class="fab fa-github fa-lg"></i>
            Se connecter avec GitHub
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
