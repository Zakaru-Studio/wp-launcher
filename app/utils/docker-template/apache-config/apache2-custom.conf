# Configuration Apache pour WordPress - Limites d'en-têtes étendues
# Augmente les limites des en-têtes HTTP pour éviter les erreurs "Bad Request"

# Taille maximale d'un champ d'en-tête (par défaut: 8190)
LimitRequestFieldSize 16384

# Nombre maximum de champs d'en-tête (par défaut: 100)  
LimitRequestFields 200

# Taille maximale de la ligne de requête (par défaut: 8190)
LimitRequestLine 16384

# Taille maximale du corps de la requête (par défaut: 0 = illimité)
LimitRequestBody 0

# Configuration pour les sessions et cookies étendus
Header always set SameSite "Lax"
Header always set Secure "false"

# Strip any HSTS header before it leaves the container.
#
# Pourquoi : un plugin de sécurité (Really Simple SSL, Wordfence, etc.)
# ou un dump WP importé depuis la prod peut envoyer
#   Strict-Transport-Security: max-age=...; includeSubDomains
# Le navigateur cache la directive AU NIVEAU DU HOSTNAME (pas du port),
# donc une seule visite contamine TOUS les sites locaux servis sur la
# même IP : le browser force https sur des ports qui n'écoutent qu'en
# http -> ERR_CONNECTION_REFUSED.
#
# `Header always unset` enlève le header dans toutes les réponses,
# y compris les 3xx/4xx, après que les modules upstream l'aient ajouté.
# Aucun WP ne peut donc plus polluer le HSTS-cache des navigateurs.
Header always unset Strict-Transport-Security

# Sur le même thème : si la source du dump utilisait
# `upgrade-insecure-requests` dans sa CSP, le browser ré-écrit toutes
# les requêtes en https. On l'enlève aussi pour éviter le même piège.
Header always edit Content-Security-Policy "upgrade-insecure-requests" ""

# Optimisations pour WordPress
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
</IfModule>

# Cache pour les ressources statiques
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    ExpiresByType image/png "access plus 1 month"
    ExpiresByType image/jpg "access plus 1 month"
    ExpiresByType image/jpeg "access plus 1 month"
    ExpiresByType image/gif "access plus 1 month"
</IfModule>

# Configuration spécifique WordPress
<IfModule mod_rewrite.c>
    RewriteEngine On
</IfModule>

# Configuration pour les permaliens WordPress
<Directory "/var/www/html">
    AllowOverride All
    Options FollowSymLinks
    Require all granted
</Directory>
