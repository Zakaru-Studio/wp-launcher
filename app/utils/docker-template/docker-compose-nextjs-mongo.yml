version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: PROJECT_NAME_mongodb_1
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: PROJECT_NAME
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - app_network
    ports:
      - "0.0.0.0:{mongodb_port}:27017"  # Port MongoDB exposé
    command: ["mongod", "--auth", "--bind_ip_all"]
    # Allocations raisonnables pour MongoDB
    mem_limit: 384m
    cpus: '0.75'
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 40s

  client:
    image: node:20-alpine
    container_name: PROJECT_NAME_client_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/client:/app:delegated
      - client_node_modules:/app/node_modules
    networks:
      - app_network
    ports:
      - "0.0.0.0:{nextjs_port}:3000"  # Port Next.js frontend
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_PUBLIC_API_URL=http://{local_ip}:{api_port}
      - API_URL=http://api:3001
      - HOST=0.0.0.0
      - PORT=3000
    command: sh -c "cd /app && npm install --prefer-offline --no-audit && npm run dev"
    depends_on:
      api:
        condition: service_started
    # Allocations optimisées pour Next.js
    mem_limit: 768m
    cpus: '0.75'
    shm_size: '1g'

  api:
    image: node:20-alpine
    container_name: PROJECT_NAME_api_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/api:/app:delegated
      - api_node_modules:/app/node_modules
    networks:
      - app_network
    ports:
      - "0.0.0.0:{api_port}:3001"  # Port API Express
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:adminpassword@mongodb:27017/PROJECT_NAME?authSource=admin
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_NAME=PROJECT_NAME
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - JWT_SECRET=your-jwt-secret-key-here-PROJECT_NAME
      - CORS_ORIGIN=http://{local_ip}:{nextjs_port}
      - API_PORT=3001
      - CLIENT_URL=http://{local_ip}:{nextjs_port}
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USER=noreply@PROJECT_NAME.test
      - SMTP_PASS=
    command: sh -c "cd /app && npm install --prefer-offline --no-audit && npm run dev"
    depends_on:
      mongodb:
        condition: service_started
      mailpit:
        condition: service_started
    # Allocations pour l'API
    mem_limit: 384m
    cpus: '0.25'

  mailpit:
    image: axllent/mailpit:latest
    container_name: PROJECT_NAME_mailpit_1
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - app_network
    ports:
      - "0.0.0.0:{mailpit_port}:8025"  # Port interface web Mailpit
      - "0.0.0.0:{smtp_port}:1025"     # Port SMTP Mailpit
    # Allocations légères
    mem_limit: 48m
    cpus: '0.25'

  mongo-express:
    image: mongo-express:latest
    container_name: PROJECT_NAME_mongo_express_1
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: adminpassword
      ME_CONFIG_MONGODB_URL: mongodb://admin:adminpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: adminpassword
    networks:
      - app_network
    ports:
      - "0.0.0.0:{mongo_express_port}:8081"  # Port Mongo Express
    depends_on:
      mongodb:
        condition: service_started
    # Allocations légères
    mem_limit: 96m
    cpus: '0.25'

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  client_node_modules:
    driver: local
  api_node_modules:
    driver: local

networks:
  app_network:
    driver: bridge 