version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: PROJECT_NAME_mysql_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../projets/{project_name}/config/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - wordpress_network
    command: --default-authentication-plugin=mysql_native_password --innodb-fast-shutdown=1
    stop_grace_period: 60s
    # Allocations raisonnables pour Docker
    mem_limit: {mysql_memory}
    cpus: '{mysql_cpu}'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5
      interval: 5s
      start_period: 30s

  wordpress:
    depends_on:
      mysql:
        condition: service_healthy
    image: wp-launcher-wordpress:latest
    container_name: PROJECT_NAME_wordpress_1
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      # Activer les logs de debug WordPress
      WORDPRESS_DEBUG: 1
      WORDPRESS_DEBUG_LOG: 1
      WORDPRESS_DEBUG_DISPLAY: 1
      # Variables pour l'auto-installation
      WP_HOME: "http://{local_ip}:{wordpress_port}"
      WP_TITLE: "{project_name}"
      WP_ADMIN_USER: "{wp_admin_user}"
      WP_ADMIN_PASSWORD: "{wp_admin_password}"
      WP_ADMIN_EMAIL: "{wp_admin_email}"
      WPLANG: "{wp_locale}"
      # Variables pour les permissions partagées
      DEV_USER_UID: "1000"
      DEV_USER_GID: "1000"
      WWW_DATA_UID: "33"
      WWW_DATA_GID: "33"
      FORCE_SHARED_PERMISSIONS: "true"
    volumes:
      - ./wordpress:/var/www/html
      - ../../projets/{project_name}/wp-content:/var/www/html/wp-content
      - ../../projets/{project_name}/wp-config.php:/var/www/html/wp-config.php
      - ../../projets/{project_name}/.htaccess:/var/www/html/.htaccess
      - ../../projets/{project_name}/config/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ../../docker-template/init-permissions.sh:/usr/local/bin/init-permissions.sh
      - ../../docker-template/wordpress/wp-content:/var/www/html/wp-content-template:ro
      - ./apache-config/apache2-custom.conf:/etc/apache2/conf-available/wordpress-custom.conf
      - ./apache-config/docker-entrypoint-custom.sh:/usr/local/bin/docker-entrypoint-custom.sh
    entrypoint: ["/usr/local/bin/docker-entrypoint-custom.sh"]
    command: ["apache2-foreground"]
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:{wordpress_port}:80"  # Port exposé sur toutes les interfaces
    # Allocations raisonnables pour Docker
    mem_limit: {wordpress_memory}
    cpus: '{wordpress_cpu}'

  phpmyadmin:
    depends_on:
      mysql:
        condition: service_healthy
    image: phpmyadmin/phpmyadmin:latest
    container_name: PROJECT_NAME_phpmyadmin_1
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_ABSOLUTE_URI: http://{local_ip}:{phpmyadmin_port}/
      # Configuration Apache pour les limites d'en-têtes
      APACHE_RUN_USER: www-data
      APACHE_RUN_GROUP: www-data
    volumes:
      - ../../projets/{project_name}/config/php.ini:/usr/local/etc/php/conf.d/phpmyadmin.ini
      - ./phpmyadmin-config/phpmyadmin-apache.conf:/etc/apache2/conf-available/phpmyadmin-custom.conf
      - ./phpmyadmin-config/init-apache.sh:/usr/local/bin/init-apache.sh
    entrypoint: ["/usr/local/bin/init-apache.sh"]
    command: ["apache2-foreground"]
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:{phpmyadmin_port}:80"  # Port phpMyAdmin
    # Allocations raisonnables
    mem_limit: 96m
    cpus: '0.25'

  mailpit:
    image: axllent/mailpit:latest
    container_name: PROJECT_NAME_mailpit_1
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:{mailpit_port}:8025"  # Port interface web Mailpit
      - "0.0.0.0:{smtp_port}:1025"     # Port SMTP Mailpit
    # Allocations légères
    mem_limit: 48m
    cpus: '0.25'

  nextjs:
    depends_on:
      wordpress:
        condition: service_started
    image: node:20-alpine
    container_name: PROJECT_NAME_nextjs_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/client:/app:delegated
      - nextjs_node_modules:/app/node_modules
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:{nextjs_port}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - APOLLO_URI=http://{local_ip}:{wordpress_port}/graphql
      - WORDPRESS_API_URL=http://wordpress/wp-json/wp/v2
      - WORDPRESS_GRAPHQL_URL=http://wordpress/graphql
      - WORDPRESS_EXTERNAL_URL=http://{local_ip}:{wordpress_port}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - PORT=3000
    command: 
      - sh
      - -c
      - |
        echo '🚀 Démarrage Next.js pour {project_name}...'
        
        # Vérifier que package.json existe
        if [ ! -f package.json ]; then
          echo '❌ package.json non trouvé dans /app'
          ls -la /app
          exit 1
        fi
        
        # Installation des dépendances
        echo '📦 Installation des dépendances...'
        npm install --prefer-offline --no-audit --silent
        
        # Création de la page d'accueil si manquante
        echo '📄 Création de la page d'accueil si manquante...'
        mkdir -p pages
        
        if [ ! -f pages/index.js ]; then
          cat > pages/index.js << 'EOL'
        import Head from 'next/head'

        export default function Home() {
          return (
            <div style={{ padding: '2rem', textAlign: 'center', fontFamily: 'Arial, sans-serif' }}>
              <Head>
                <title>{project_name} - Next.js Frontend</title>
                <meta name="description" content="Next.js frontend for {project_name}" />
                <link rel="icon" href="/favicon.ico" />
              </Head>

              <main>
                <h1 style={{ color: '#0070f3', marginBottom: '1rem' }}>
                  🚀 {project_name} Next.js Frontend
                </h1>
                <p style={{ fontSize: '1.2rem', marginBottom: '2rem' }}>
                  Frontend headless pour votre site WordPress
                </p>
                <div style={{ marginTop: '2rem' }}>
                  <a 
                    href="http://{local_ip}:{wordpress_port}" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    style={{ 
                      padding: '0.5rem 1rem', 
                      backgroundColor: '#0070f3', 
                      color: 'white', 
                      textDecoration: 'none', 
                      borderRadius: '5px' 
                    }}
                  >
                    ← Accéder à WordPress
                  </a>
                </div>
              </main>
            </div>
          )
        }
        EOL
        fi
        
        # Créer next.config.ts avec allowedDevOrigins
        if [ ! -f next.config.ts ]; then
          cat > next.config.ts << 'EOL'
        import type { NextConfig } from "next";

        const nextConfig: NextConfig = {
          images: {
            remotePatterns: [
              {
                protocol: "http",
                hostname: "{local_ip}",
                port: "{wordpress_port}",
                pathname: "/wp-content/uploads/**",
              },
            ],
          },
          experimental: {
            allowedDevOrigins: ["{local_ip}:{nextjs_port}", "{local_ip}"],
          },
        };

        export default nextConfig;
        EOL
        fi
        
        # Lancement du serveur de développement
        echo '✅ Lancement du serveur de développement...'
        npm run dev
    # Allocations optimisées
    mem_limit: 768m
    cpus: '0.75'
    shm_size: '1g'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
    driver: local
  nextjs_node_modules:
    driver: local

networks:
  wordpress_network:
    driver: bridge 