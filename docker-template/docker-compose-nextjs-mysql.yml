version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: PROJECT_NAME_mysql_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: PROJECT_NAME
      MYSQL_USER: PROJECT_NAME
      MYSQL_PASSWORD: projectpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../projets/{project_name}/config/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - app_network
    ports:
      - "0.0.0.0:{mysql_port}:3306"  # Port MySQL exposé
    command: --default-authentication-plugin=mysql_native_password
    # Allocations raisonnables pour MySQL
    mem_limit: {mysql_memory}
    cpus: '{mysql_cpu}'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 40s

  client:
    image: node:20-alpine
    container_name: PROJECT_NAME_client_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/client:/app:delegated
      - client_node_modules:/app/node_modules
    networks:
      - app_network
    ports:
      - "0.0.0.0:{nextjs_port}:3000"  # Port Next.js frontend
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_PUBLIC_API_URL=http://{local_ip}:{api_port}
      - API_URL=http://api:3001
      - HOST=0.0.0.0
      - PORT=3000
    command: sh -c "cd /app && npm install --prefer-offline --no-audit && npm run dev"
    depends_on:
      api:
        condition: service_started
    # Allocations optimisées pour Next.js
    mem_limit: 768m
    cpus: '0.75'
    shm_size: '1g'

  api:
    image: node:20-alpine
    container_name: PROJECT_NAME_api_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/api:/app:delegated
      - api_node_modules:/app/node_modules
    networks:
      - app_network
    ports:
      - "0.0.0.0:{api_port}:3001"  # Port API Express
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://PROJECT_NAME:projectpassword@mysql:3306/PROJECT_NAME
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=PROJECT_NAME
      - DB_USER=PROJECT_NAME
      - DB_PASSWORD=projectpassword
      - JWT_SECRET=your-jwt-secret-key-here-PROJECT_NAME
      - CORS_ORIGIN=http://{local_ip}:{nextjs_port}
      - API_PORT=3001
      - CLIENT_URL=http://{local_ip}:{nextjs_port}
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USER=noreply@PROJECT_NAME.test
      - SMTP_PASS=
    command: sh -c "cd /app && npm install --prefer-offline --no-audit && npm run dev"
    depends_on:
      mysql:
        condition: service_started
      mailpit:
        condition: service_started
    # Allocations pour l'API
    mem_limit: 384m
    cpus: '0.25'

  mailpit:
    image: axllent/mailpit:latest
    container_name: PROJECT_NAME_mailpit_1
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - app_network
    ports:
      - "0.0.0.0:{mailpit_port}:8025"  # Port interface web Mailpit
      - "0.0.0.0:{smtp_port}:1025"     # Port SMTP Mailpit
    # Allocations légères
    mem_limit: 48m
    cpus: '0.25'

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: PROJECT_NAME_phpmyadmin_1
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_ABSOLUTE_URI: http://{local_ip}:{phpmyadmin_port}/
      # Configuration Apache pour les limites d'en-têtes
      APACHE_RUN_USER: www-data
      APACHE_RUN_GROUP: www-data
    volumes:
      - ../../projets/{project_name}/config/php.ini:/usr/local/etc/php/conf.d/phpmyadmin.ini
      - ./phpmyadmin-config/phpmyadmin-apache.conf:/etc/apache2/conf-available/phpmyadmin-custom.conf
      - ./phpmyadmin-config/init-apache.sh:/usr/local/bin/init-apache.sh
      - ./uploads:/tmp/uploads
    entrypoint: ["/usr/local/bin/init-apache.sh"]
    command: ["apache2-foreground"]
    networks:
      - app_network
    ports:
      - "0.0.0.0:{phpmyadmin_port}:80"  # Port phpMyAdmin
    depends_on:
      mysql:
        condition: service_started
    # Allocations légères
    mem_limit: 96m
    cpus: '0.25'

volumes:
  mysql_data:
    driver: local
  client_node_modules:
    driver: local
  api_node_modules:
    driver: local

networks:
  app_network:
    driver: bridge 