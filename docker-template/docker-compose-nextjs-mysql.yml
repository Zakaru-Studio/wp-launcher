version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: PROJECT_NAME_mysql_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: PROJECT_NAME
      MYSQL_USER: PROJECT_NAME
      MYSQL_PASSWORD: projectpassword
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    ports:
      - "0.0.0.0:8080:3306"  # Port MySQL exposé
    command: --default-authentication-plugin=mysql_native_password
    # Allocations raisonnables pour MySQL
    mem_limit: 1g
    cpus: '2'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 40s

  nextjs:
    image: node:20-alpine
    container_name: PROJECT_NAME_nextjs_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/nextjs:/app:delegated
      - nextjs_node_modules:/app/node_modules
    networks:
      - app_network
      - traefik-network
    ports:
      - "0.0.0.0:8081:3000"  # Port Next.js frontend
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=mysql://PROJECT_NAME:projectpassword@mysql:3306/PROJECT_NAME
      - JWT_SECRET=your-jwt-secret-key-here
      - NEXTAUTH_SECRET=your-nextauth-secret-here
      - NEXTAUTH_URL=https://{project_hostname}.dev.akdigital.fr
    command: sh -c "cd /app && npm ci --prefer-offline --no-audit && npm run dev"
    depends_on:
      mysql:
        condition: service_started
    # Allocations optimisées pour Next.js
    mem_limit: 2g
    cpus: '2'
    shm_size: '1g'

  api:
    image: node:20-alpine
    container_name: PROJECT_NAME_api_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/nextjs/api:/app:delegated
      - api_node_modules:/app/node_modules
    networks:
      - app_network
      - traefik-network
    ports:
      - "0.0.0.0:8082:3001"  # Port API Express
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://PROJECT_NAME:projectpassword@mysql:3306/PROJECT_NAME
      - JWT_SECRET=your-jwt-secret-key-here
      - CORS_ORIGIN=https://{project_hostname}.dev.akdigital.fr
      - API_PORT=3001
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_USER=noreply@PROJECT_NAME.test
      - SMTP_PASS=
    command: sh -c "cd /app && npm ci --prefer-offline --no-audit && npm run dev"
    depends_on:
      mysql:
        condition: service_started
      mailpit:
        condition: service_started
    # Allocations pour l'API
    mem_limit: 1g
    cpus: '1'

  mailpit:
    image: axllent/mailpit:latest
    container_name: PROJECT_NAME_mailpit_1
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - app_network
    ports:
      - "0.0.0.0:8083:8025"  # Port interface web Mailpit
      - "0.0.0.0:8084:1025"     # Port SMTP Mailpit
    # Allocations légères
    mem_limit: 128M
    cpus: '0.5'

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: PROJECT_NAME_phpmyadmin_1
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - app_network
    ports:
      - "0.0.0.0:8085:80"  # Port phpMyAdmin
    depends_on:
      mysql:
        condition: service_started
    # Allocations légères
    mem_limit: 256M
    cpus: '0.5'

volumes:
  mysql_data:
    driver: local
  nextjs_node_modules:
    driver: local
  api_node_modules:
    driver: local

networks:
  app_network:
    driver: bridge
  traefik-network:
    external: true 