version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: PROJECT_NAME_mysql_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-config:/etc/mysql/conf.d
    networks:
      - wordpress_network
    command: --default-authentication-plugin=mysql_native_password
    # Optimisations haute performance Intel 285K + 35GB RAM
    mem_limit: 16g
    cpus: '16'
    ulimits:
      nproc: 100000
      nofile:
        soft: 100000
        hard: 100000
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535

  wordpress:
    depends_on:
      - mysql
    image: wordpress:latest
    container_name: PROJECT_NAME_wordpress_1
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      # Activer les logs de debug WordPress
      WORDPRESS_DEBUG: 1
      WORDPRESS_DEBUG_LOG: 1
      WORDPRESS_DEBUG_DISPLAY: 1
    volumes:
      - ./wordpress:/var/www/html
      - ./php-config/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:PROJECT_PORT:80"  # Port exposé sur toutes les interfaces
    # Optimisations haute performance
    mem_limit: 4g
    cpus: '8'
    ulimits:
      nproc: 100000
      nofile:
        soft: 100000
        hard: 100000

  phpmyadmin:
    depends_on:
      - mysql
    image: phpmyadmin/phpmyadmin:latest
    container_name: PROJECT_NAME_phpmyadmin_1
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_ABSOLUTE_URI: http://192.168.1.21:PROJECT_PMA_PORT/
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:PROJECT_PMA_PORT:80"  # Port phpMyAdmin
    # Optimisations
    mem_limit: 512M
    cpus: '2'

  mailpit:
    image: axllent/mailpit:latest
    container_name: PROJECT_NAME_mailpit_1
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:PROJECT_MAILPIT_PORT:8025"  # Port interface web Mailpit
      - "0.0.0.0:PROJECT_SMTP_PORT:1025"     # Port SMTP Mailpit
    # Optimisations
    mem_limit: 256M
    cpus: '1'
    # Configuration sécurité pour éviter les problèmes AppArmor
    security_opt:
      - apparmor:unconfined

volumes:
  mysql_data:
    driver: local

networks:
  wordpress_network: 