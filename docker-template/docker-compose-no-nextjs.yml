version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: PROJECT_NAME_mysql_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../projets/{project_name}/config/mysql.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - wordpress_network
    command: --default-authentication-plugin=mysql_native_password
    # Allocations raisonnables pour Docker
    mem_limit: {mysql_memory}
    cpus: '{mysql_cpu}'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5
      interval: 5s
      start_period: 30s

  wordpress:
    depends_on:
      mysql:
        condition: service_healthy
    image: wp-launcher-wordpress:latest
    container_name: PROJECT_NAME_wordpress_1
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      # Activer les logs de debug WordPress
      WORDPRESS_DEBUG: 1
      WORDPRESS_DEBUG_LOG: 1
      WORDPRESS_DEBUG_DISPLAY: 1
      # Variables pour l'auto-installation
      WP_HOME: "http://{local_ip}:{wordpress_port}"
      WP_TITLE: "{project_name}"
      WP_ADMIN_USER: "{wp_admin_user}"
      WP_ADMIN_PASSWORD: "{wp_admin_password}"
      WP_ADMIN_EMAIL: "{wp_admin_email}"
      WPLANG: "{wp_locale}"
      # Variables pour les permissions partagées
      DEV_USER_UID: "1000"
      DEV_USER_GID: "1000"
      WWW_DATA_UID: "33"
      WWW_DATA_GID: "33"
      FORCE_SHARED_PERMISSIONS: "true"
    volumes:
      - ./wordpress:/var/www/html
      - ../../projets/{project_name}/wp-content:/var/www/html/wp-content
      - ../../projets/{project_name}/wp-config.php:/var/www/html/wp-config.php
      - ../../projets/{project_name}/.htaccess:/var/www/html/.htaccess
      - ../../projets/{project_name}/config/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ../../docker-template/init-permissions.sh:/usr/local/bin/init-permissions.sh
      - ../../docker-template/wordpress/wp-content:/var/www/html/wp-content-template:ro
      - ./apache-config/apache2-custom.conf:/etc/apache2/conf-available/wordpress-custom.conf
      - ./apache-config/docker-entrypoint-custom.sh:/usr/local/bin/docker-entrypoint-custom.sh
    entrypoint: ["/usr/local/bin/docker-entrypoint-custom.sh"]
    command: ["apache2-foreground"]
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:{wordpress_port}:80"  # Port exposé sur toutes les interfaces
    # Allocations raisonnables pour Docker
    mem_limit: {wordpress_memory}
    cpus: '{wordpress_cpu}'
    # Permissions étendues pour l'écriture
    privileged: false
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE

  phpmyadmin:
    depends_on:
      mysql:
        condition: service_healthy
    image: phpmyadmin/phpmyadmin:latest
    container_name: PROJECT_NAME_phpmyadmin_1
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_ABSOLUTE_URI: http://{local_ip}:{phpmyadmin_port}/
      # Configuration Apache pour les limites d'en-têtes
      APACHE_RUN_USER: www-data
      APACHE_RUN_GROUP: www-data
    volumes:
      - ../../projets/{project_name}/config/php.ini:/usr/local/etc/php/conf.d/phpmyadmin.ini
      - ./phpmyadmin-config/phpmyadmin-apache.conf:/etc/apache2/conf-available/phpmyadmin-custom.conf
      - ./phpmyadmin-config/init-apache.sh:/usr/local/bin/init-apache.sh
    entrypoint: ["/usr/local/bin/init-apache.sh"]
    command: ["apache2-foreground"]
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:{phpmyadmin_port}:80"  # Port phpMyAdmin
    # Allocations raisonnables
    mem_limit: 96m
    cpus: '0.25'

  mailpit:
    image: axllent/mailpit:latest
    container_name: PROJECT_NAME_mailpit_1
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:{mailpit_port}:8025"  # Port interface web Mailpit
      - "0.0.0.0:{smtp_port}:1025"     # Port SMTP Mailpit
    # Allocations légères
    mem_limit: 48m
    cpus: '0.25'

volumes:
  mysql_data:
    driver: local

networks:
  wordpress_network:
    driver: bridge 