version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: PROJECT_NAME_mysql_1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-config:/etc/mysql/conf.d
    networks:
      - wordpress_network
    command: --default-authentication-plugin=mysql_native_password
    # Allocations raisonnables pour Docker
    mem_limit: 1g
    cpus: '2'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 10s
      retries: 5
      interval: 5s
      start_period: 30s

  wordpress:
    depends_on:
      mysql:
        condition: service_started
    image: wordpress:latest
    container_name: PROJECT_NAME_wordpress_1
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      # Activer les logs de debug WordPress
      WORDPRESS_DEBUG: 1
      WORDPRESS_DEBUG_LOG: 1
      WORDPRESS_DEBUG_DISPLAY: 1
    volumes:
      - ./wordpress:/var/www/html
      - ../../projets/{project_name}/wp-content:/var/www/html/wp-content
      - ../../projets/{project_name}/wp-config.php:/var/www/html/wp-config.php
      - ./php-config/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:PROJECT_PORT:80"  # Port exposé sur toutes les interfaces
    # Allocations raisonnables pour Docker
    mem_limit: 1g
    cpus: '2'

  phpmyadmin:
    depends_on:
      mysql:
        condition: service_started
    image: phpmyadmin/phpmyadmin:latest
    container_name: PROJECT_NAME_phpmyadmin_1
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: wordpress
      PMA_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_ABSOLUTE_URI: http://192.168.1.21:PROJECT_PMA_PORT/
    volumes:
      - ./phpmyadmin-config/php.ini:/usr/local/etc/php/conf.d/phpmyadmin.ini
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:PROJECT_PMA_PORT:80"  # Port phpMyAdmin
    # Allocations raisonnables
    mem_limit: 256M
    cpus: '1'

  mailpit:
    image: axllent/mailpit:latest
    container_name: PROJECT_NAME_mailpit_1
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:PROJECT_MAILPIT_PORT:8025"  # Port interface web Mailpit
      - "0.0.0.0:PROJECT_SMTP_PORT:1025"     # Port SMTP Mailpit
    # Allocations légères
    mem_limit: 128M
    cpus: '0.5'

  nextjs:
    image: node:20
    container_name: PROJECT_NAME_nextjs_1
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../projets/{project_name}/nextjs:/app
      - nextjs_node_modules:/app/node_modules
    networks:
      - wordpress_network
    ports:
      - "0.0.0.0:PROJECT_NEXTJS_PORT:3000"  # Port Next.js
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - TURBOPACK=1
    command: sh -c "if [ -f package.json ]; then npm ci --prefer-offline --no-audit && npm run dev -- --turbo; else echo 'Next.js non configuré - créez votre projet dans le dossier nextjs/'; tail -f /dev/null; fi"
    # Allocations optimisées pour Next.js
    mem_limit: 2g
    cpus: '2'
    shm_size: '1g'

volumes:
  mysql_data:
    driver: local
  nextjs_node_modules:
    driver: local

networks:
  wordpress_network: 