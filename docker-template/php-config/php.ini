; Configuration PHP ultra haute performance - Intel 285K + 35GB RAM
; Limites de mémoire maximales
memory_limit = 10240M
post_max_size = 10240M
upload_max_filesize = 10240M
max_file_uploads = 20

; Timeouts et limites d'exécution étendus
max_execution_time = 0
max_input_time = 7200
set_time_limit = 0

; Limites de variables étendues
max_input_vars = 10000
max_input_nesting_level = 128

; Optimisations de performance
realpath_cache_size = 256M
realpath_cache_ttl = 3600
opcache.enable = 1
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 64
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

; Gestion des erreurs et logs
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /var/log/php_errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Sessions
session.gc_maxlifetime = 7200
session.cookie_lifetime = 7200

; Optimisations diverses
default_socket_timeout = 600
mysql.connect_timeout = 600
mysqli.default_socket_timeout = 600

; Désactiver les limites pour les imports
auto_detect_line_endings = On
default_charset = "utf-8" 