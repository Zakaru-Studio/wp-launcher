# Configuration Apache pour phpMyAdmin - Limites d'en-têtes étendues
# Augmente les limites des en-têtes HTTP pour éviter les erreurs "Bad Request"

# Taille maximale d'un champ d'en-tête (par défaut: 8190)
LimitRequestFieldSize 16384

# Nombre maximum de champs d'en-tête (par défaut: 100)  
LimitRequestFields 200

# Taille maximale de la ligne de requête (par défaut: 8190)
LimitRequestLine 16384

# Taille maximale du corps de la requête (par défaut: 0 = illimité)
LimitRequestBody 0

# Configuration pour les sessions et cookies étendus
Header always set SameSite "Lax"
Header always set Secure "false"

# Optimisations pour phpMyAdmin
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
</IfModule>

# Cache pour les ressources statiques
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    ExpiresByType image/png "access plus 1 month"
    ExpiresByType image/jpg "access plus 1 month"
    ExpiresByType image/jpeg "access plus 1 month"
    ExpiresByType image/gif "access plus 1 month"
</IfModule>
