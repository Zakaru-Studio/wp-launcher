version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:443"  # Port alternatif pour contourner l'interception Livebox
      - "8080:8080"  # Dashboard Traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - ./acme.json:/acme.json
      - ./dynamic.yml:/dynamic.yml:ro
      - ./fullchain.pem:/fullchain.pem:ro
      - ./privkey.pem:/privkey.pem:ro
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL:-admin@akdigital.fr}
      - CF_API_KEY=${CF_API_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.dev.akdigital.fr`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$2y$$10$$9VTJ8jXgfaZKqfgVFfEEAeHVZYG3RhqZiCVmOJkWZfxJOkA7K5VGu"  # admin:admin
    networks:
      - traefik-network

volumes:
  traefik-data:
    driver: local

networks:
  traefik-network:
    external: true 